name: macOS Wheels

on:
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  macos-wheel:
    name: Build macOS wheel
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"

      - name: Install host build tools
        shell: bash
        run: |
          set -euxo pipefail
          brew update
          brew install cmake ninja

      - name: Install cibuildwheel
        shell: bash
        run: |
          set -euxo pipefail
          unset UV_NATIVE_TLS
          rm -rf /tmp/cplantbox-cibuildwheel-macos-venv
          uv python install 3.11 3.12 3.13 3.14
          uv venv /tmp/cplantbox-cibuildwheel-macos-venv --python 3.11
          source /tmp/cplantbox-cibuildwheel-macos-venv/bin/activate
          uv pip install cibuildwheel==3.4.1 delocate

      - name: Build and test macOS wheel with cibuildwheel
        if: ${{ env.ACT != 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          source /tmp/cplantbox-cibuildwheel-macos-venv/bin/activate
          python -m cibuildwheel --platform macos --output-dir wheelhouse

      - name: Build and test macOS wheel with local host helper
        if: ${{ env.ACT == 'true' }}
        shell: bash
        run: |
          set -euxo pipefail
          rm -rf wheelhouse
          mkdir -p wheelhouse
          native_deps_prefix=/tmp/cplantbox-act-native-deps-macos
          build_native_deps=1
          for python_version in 3.11 3.12 3.13 3.14; do
            python_tag=py${python_version/./}
            CPB_PYTHON="$(uv python find "${python_version}")" \
            CPB_NATIVE_DEPS_PREFIX="${native_deps_prefix}" \
            CPB_BUILD_NATIVE_DEPS="${build_native_deps}" \
            CPB_WHEELHOUSE="/tmp/cplantbox-act-wheelhouse-macos-${python_tag}" \
            CPB_WHEEL_BUILD_VENV="/tmp/cplantbox-wheel-build-macos-${python_tag}" \
            CPB_WHEEL_TEST_VENV="/tmp/cplantbox-wheel-test-macos-${python_tag}" \
            CPB_SKBUILD_DIR="/tmp/cplantbox-skbuild-macos-${python_tag}" \
              scripts/wheel/smoke-test-macos.sh
            cp "/tmp/cplantbox-act-wheelhouse-macos-${python_tag}"/*.whl wheelhouse/
            build_native_deps=0
          done

      - name: Audit macOS wheel artifact
        shell: bash
        run: |
          set -euxo pipefail
          source /tmp/cplantbox-cibuildwheel-macos-venv/bin/activate
          CPB_EXPECTED_WHEEL_COUNT=4 scripts/ci/audit-wheelhouse-macos.sh wheelhouse

      - name: Upload macOS wheel artifact
        if: ${{ env.ACT != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: cplantbox-macos-native
          path: wheelhouse/*.whl
          if-no-files-found: error
