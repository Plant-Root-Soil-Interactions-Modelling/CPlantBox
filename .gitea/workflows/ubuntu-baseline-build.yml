name: Ubuntu Baseline Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - wheels/**
  workflow_dispatch:

jobs:
  ubuntu-baseline-build:
    name: Build documented Ubuntu install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Ubuntu prerequisites
        shell: bash
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            default-jre \
            g++ \
            gcc \
            gfortran \
            git \
            libboost-all-dev \
            libeigen3-dev \
            libopenmpi-dev \
            libqt5x11extras5 \
            libx11-dev \
            openmpi-bin \
            pkg-config \
            python3 \
            python3-dev \
            python3-pip \
            python3-tk \
            python3-venv \
            wget

      - name: Create Python environment
        shell: bash
        run: |
          set -euxo pipefail
          python3 -m venv cpbenv
          source cpbenv/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -r requirements.txt

      - name: Configure and build CPlantBox
        shell: bash
        run: |
          set -euxo pipefail
          source cpbenv/bin/activate
          git submodule update --init --recursive
          cmake .
          make install -j"$(nproc)"

      - name: Run documented tutorial smoke test
        shell: bash
        run: |
          set -euxo pipefail
          source cpbenv/bin/activate
          cd tutorial/examples
          # README documents example1a_small.py. Use the no-plot variant in CI
          # to avoid requiring a display while still exercising the installed build.
          python example1a_small_noplot.py
