name: Ubuntu Baseline Build

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
      - wheels/**
  workflow_dispatch:

jobs:
  ubuntu-baseline-build:
    name: Build documented Ubuntu install
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: https://github.com/actions/checkout@v4
        with:
          submodules: recursive

      - name: Install uv
        uses: https://github.com/astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.16"

      - name: Install Ubuntu prerequisites
        shell: bash
        run: |
          set -euxo pipefail
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            cmake \
            default-jre \
            g++ \
            gcc \
            gfortran \
            git \
            libboost-all-dev \
            libeigen3-dev \
            libopenmpi-dev \
            libqt5x11extras5 \
            libx11-dev \
            openmpi-bin \
            pkg-config \
            python3 \
            python3-dev \
            python3-tk \
            wget

      - name: Create Python environment
        shell: bash
        run: |
          set -euxo pipefail
          unset UV_NATIVE_TLS
          uv python install 3.11
          uv venv cpbenv --python 3.11
          source cpbenv/bin/activate
          uv pip install setuptools wheel
          uv pip install -r requirements.txt

      - name: Configure and build CPlantBox
        shell: bash
        run: |
          set -euxo pipefail
          source cpbenv/bin/activate
          git submodule update --init --recursive
          cmake .
          make install -j"$(nproc)"

      - name: Check manual install imports from venv
        shell: bash
        run: |
          set -euxo pipefail
          source cpbenv/bin/activate
          cd /tmp
          python - <<'PY'
          import pathlib
          import site
          import plantbox

          module_path = pathlib.Path(plantbox.__file__).resolve()
          site_packages = [pathlib.Path(p).resolve() for p in site.getsitepackages()]
          print(module_path)
          assert any(module_path.is_relative_to(p) for p in site_packages), (module_path, site_packages)
          PY

      - name: Check Python extension does not link libpython
        shell: bash
        run: |
          set -euxo pipefail
          source cpbenv/bin/activate
          python - <<'PY' > /tmp/cplantbox-extension.txt
          import pathlib
          import plantbox.plantbox as extension
          print(pathlib.Path(extension.__file__))
          PY
          readelf -d "$(cat /tmp/cplantbox-extension.txt)" | tee /tmp/cplantbox-readelf.txt
          ! grep -E 'NEEDED.*libpython[0-9]' /tmp/cplantbox-readelf.txt

      - name: Check installed package data
        shell: bash
        run: |
          set -euxo pipefail
          source cpbenv/bin/activate
          python - <<'PY'
          from pathlib import Path
          import plantbox as pb
          root = Path(pb.data_path())
          assert root.exists(), root
          assert (root / "structural" / "plant" / "fspm2023.xml").exists(), root
          print(root)
          PY

      - name: Run documented tutorial smoke test
        shell: bash
        run: |
          set -euxo pipefail
          source cpbenv/bin/activate
          cd tutorial/examples
          # README documents example1a_small.py. Use the no-plot variant in CI
          # to avoid requiring a display while still exercising the installed build.
          python example1a_small_noplot.py

      - name: Run unit tests
        shell: bash
        run: |
          set -euxo pipefail
          source cpbenv/bin/activate
          cd test
          for test_file in *.py; do
            python "${test_file}"
          done
